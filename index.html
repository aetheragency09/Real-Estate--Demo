<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aether Agency \u2014 AI Automation</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f8f7f4;
  --bg2: #f2f0ec;
  --dark: #0e0e0e;
  --dark2: #1a1a1a;
  --accent: #2563eb;
  --accent2: #7c3aed;
  --muted: #6b7280;
  --border: rgba(0,0,0,0.08);
  --glass: rgba(255,255,255,0.7);
  --radius: 20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--dark);
  font-family:'Outfit',sans-serif;
  font-weight:300;
  overflow-x:hidden;
  cursor:none;
}

/* \u2500\u2500 CURSOR \u2500\u2500 */
#cursor{
  position:fixed;width:10px;height:10px;
  background:var(--accent);border-radius:50%;
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,background .2s;
}
#cursor-ring{
  position:fixed;width:36px;height:36px;
  border:1.5px solid rgba(37,99,235,.4);
  border-radius:50%;pointer-events:none;z-index:9998;
  transform:translate(-50%,-50%);
  transition:transform .08s,width .2s,height .2s;
}
body:has(a:hover) #cursor,body:has(button:hover) #cursor{width:16px;height:16px;background:var(--accent2);}
body:has(a:hover) #cursor-ring,body:has(button:hover) #cursor-ring{width:50px;height:50px;}

/* \u2500\u2500 NAV \u2500\u2500 */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.4rem 5%;
  background:rgba(248,247,244,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Outfit',sans-serif;font-weight:700;font-size:1.25rem;
  letter-spacing:-.03em;color:var(--dark);text-decoration:none;
}
.logo em{font-style:normal;color:var(--accent);}
nav ul{list-style:none;display:flex;gap:2.5rem;}
nav ul a{
  color:var(--muted);text-decoration:none;
  font-size:.88rem;font-weight:400;letter-spacing:.01em;
  transition:color .2s;
}
nav ul a:hover{color:var(--dark);}
.nav-btn{
  background:var(--dark);color:#fff;
  padding:.55rem 1.4rem;border-radius:50px;
  font-size:.85rem;font-weight:500;text-decoration:none;
  transition:background .2s,transform .2s;
  border:none;cursor:pointer;font-family:inherit;
}
.nav-btn:hover{background:var(--accent);transform:translateY(-1px);}

/* \u2500\u2500 HERO \u2500\u2500 */
#hero{
  min-height:100vh;
  display:grid;grid-template-columns:1fr 1fr;
  align-items:center;
  padding:8rem 5% 4rem;
  gap:4rem;
  position:relative;
}
.hero-left{z-index:2;}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:.5rem;
  font-size:.75rem;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:1.6rem;
  opacity:0;animation:fadeUp .8s .1s ease forwards;
}
.hero-eyebrow::before{content:'';width:28px;height:1.5px;background:var(--accent);}
h1{
  font-family:'Outfit',sans-serif;
  font-size:clamp(3rem,5vw,4.8rem);
  font-weight:700;line-height:1.05;
  letter-spacing:-.04em;
  margin-bottom:1.5rem;
  opacity:0;animation:fadeUp .9s .2s ease forwards;
}
h1 .serif{
  font-family:'Instrument Serif',serif;
  font-style:italic;font-weight:400;
  color:var(--accent);
}
.hero-p{
  color:var(--muted);font-size:1.05rem;
  max-width:420px;line-height:1.7;
  margin-bottom:2.5rem;
  opacity:0;animation:fadeUp 1s .3s ease forwards;
}
.hero-actions{
  display:flex;gap:1rem;flex-wrap:wrap;
  opacity:0;animation:fadeUp 1s .4s ease forwards;
}
.btn-dark{
  background:var(--dark);color:#fff;
  padding:.85rem 2rem;border-radius:50px;
  font-size:.95rem;font-weight:500;
  text-decoration:none;border:none;cursor:pointer;
  font-family:inherit;
  transition:background .2s,transform .2s,box-shadow .2s;
}
.btn-dark:hover{background:var(--accent);transform:translateY(-2px);box-shadow:0 12px 30px rgba(37,99,235,.25);}
.btn-outline{
  background:transparent;
  border:1.5px solid rgba(0,0,0,.15);
  color:var(--dark);padding:.85rem 2rem;
  border-radius:50px;font-size:.95rem;
  font-weight:400;text-decoration:none;
  cursor:pointer;font-family:inherit;
  transition:border-color .2s,transform .2s;
}
.btn-outline:hover{border-color:var(--dark);transform:translateY(-2px);}

.hero-right{
  position:relative;height:580px;
  opacity:0;animation:fadeIn 1.2s .5s ease forwards;
}
#hero-canvas{
  width:100%;height:100%;
  border-radius:24px;
  background:linear-gradient(145deg,#0e0e0e 0%,#1a1a2e 50%,#16213e 100%);
  overflow:hidden;
}
.hero-card-overlay{
  position:absolute;bottom:2rem;left:2rem;right:2rem;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(12px);
  border-radius:16px;padding:1.2rem 1.5rem;
  border:1px solid rgba(255,255,255,.8);
  display:flex;align-items:center;gap:1rem;
}
.hco-icon{
  width:42px;height:42px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
}
.hco-text h4{font-size:.9rem;font-weight:600;margin-bottom:.2rem;}
.hco-text p{font-size:.78rem;color:var(--muted);}
.hco-stat
